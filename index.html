<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-container">
    <h2>Login to Use Expense Tracker</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container" id="tracker" style="display: none;">
    <h2>Expense Tracker</h2>
    <div class="balance">
      <h4>Your Balance</h4>
      <h1 id="balance">$0.00</h1>
    </div>
    <div class="inc-exp-container">
      <div class="income">
        <h4>Income</h4>
        <p id="money-plus">+$0.00</p>
      </div>
      <div class="expense">
        <h4>Expense</h4>
        <p id="money-minus">-$0.00</p>
      </div>
    </div>
    <h3>History</h3>
    <ul class="list" id="list">
      <!-- Transactions appear here -->
    </ul>
    <h3>Add New Transaction</h3>
    <div class="form-control">
      <label for="text">Text</label>
      <input type="text" id="text" placeholder="Enter description..." />
    </div>
    <div class="form-control">
      <label for="amount">Amount <br /> (negative - expense, positive - income)</label>
      <input type="number" id="amount" placeholder="Enter amount..." />
    </div>
    <div class="form-control">
      <button onclick="addTransaction()">Add Transaction</button>
    </div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => alert("Signup successful!"))
        .catch(err => alert(err.message));
    }

    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => alert("Login successful!"))
        .catch(err => alert(err.message));
    }

    function logout() {
      auth.signOut().then(() => alert("Logged out"));
    }

    auth.onAuthStateChanged(user => {
      document.getElementById("tracker").style.display = user ? "block" : "none";
    });

    // Expense Tracker Logic
    const balance = document.getElementById('balance');
    const money_plus = document.getElementById('money-plus');
    const money_minus = document.getElementById('money-minus');
    const list = document.getElementById('list');

    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
    updateUI();

    function saveTransactions() {
      localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function addTransaction() {
      const text = document.getElementById('text').value;
      const amount = parseFloat(document.getElementById('amount').value);
      if (text === '' || isNaN(amount)) return alert('Please enter text and amount');
      const transaction = {
        id: Date.now(),
        text,
        amount
      };
      transactions.push(transaction);
      updateUI();
      saveTransactions();
      document.getElementById('text').value = '';
      document.getElementById('amount').value = '';
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(transaction => transaction.id !== id);
      updateUI();
      saveTransactions();
    }

    function updateUI() {
      list.innerHTML = '';
      transactions.forEach(transaction => {
        const sign = transaction.amount < 0 ? '-' : '+';
        const item = document.createElement('li');
        item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');
        item.innerHTML = `
          ${transaction.text} <span>${sign}$${Math.abs(transaction.amount).toFixed(2)}</span>
          <button class="delete-btn" onclick="deleteTransaction(${transaction.id})"><i class="fas fa-trash"></i></button>
        `;
        list.appendChild(item);
      });
      const amounts = transactions.map(t => t.amount);
      const total = amounts.reduce((acc, item) => acc + item, 0).toFixed(2);
      const income = amounts.filter(i => i > 0).reduce((acc, item) => acc + item, 0).toFixed(2);
      const expense = amounts.filter(i => i < 0).reduce((acc, item) => acc + item, 0).toFixed(2);

      balance.innerText = `$${total}`;
      money_plus.innerText = `+$${income}`;
      money_minus.innerText = `-$${Math.abs(expense)}`;
    }
  </script>
</body>
</html>
